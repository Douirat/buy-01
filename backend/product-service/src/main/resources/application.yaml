spring:
  application:
    name: product-service   # this exact name is how the gateway will find it
  data:
    mongodb:
      uri: mongodb://localhost:27017/product-service
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
server:
  port: 0   # random port — Eureka handles discovery, so hardcoding a port is pointless